resource1:
  count: 2
  capabilities:
    host:
      properties:
        num-cpus:        { $in_range: [2, 8] }
        mem-size:        { $greater_or_equal: 8 } # GB
        disk-size:       10     # GB
        cpu-architecture: x86_64
    os:
      properties:
        type:          linux
        distribution:  ubuntu
        version:       { $in: [ "22.04", "24.04" ] }
    resource:
      properties:
        provider:          { $in: [ Amazon, Azure, Openstack ] }
        capacity-provider: ACME
        type:              cloud
    pricing:
      properties:
        cost: { $less_or_equal: 2} # credit / hr
    locality:
      properties:
        continent: { $in: [ Europe, Asia, "North America" ] }
        country:   { $in: [ Spain, UK, India, USA ] }
        city:      { $in: [ Madrid, London, Mumbai, Virginia ] }
    energy:
      properties:
        energy-type:   { $in: [ Green, Mix ] }
        powered-type:  { $in: [ Battery, Mains ] }
        consumption:   { $less_or_equal: 200} # W
resource2:
  capabilities:
    host:
      properties:
        num-cpus:        { $in_range: [8, 16] }
        mem-size:        { $greater_or_equal: 64 } # GB
        disk-size:       { $greater_or_equal: 800 } # GB
        cpu-architecture: x86_64
    os:
      properties:
        type:          linux
        distribution:  ubuntu
        version:       "22.04"
    resource:
      properties:
        provider: { $in: [Amazon, Openstack]}
        capacity-provider: ACME
        type: cloud
    pricing:
      properties:
        cost: { $less_or_equal: 4} # credit / hr
    locality:
      properties:
        continent: { $in: [ Europe ] }
        country:   { $in: [ UK ] }
        city:      { $in: [ London ] }
    energy:
      properties:
        energy-type:   { $in: [ Green, Mix ] }
        powered-type:  { $in: [ Battery, Mains ] }
        consumption:   { $less_or_equal: 300} # W
resource3:
  capabilities:
    host:
      properties:
        num-cpus: { $in_range: [2, 8] }
        mem-size: { $greater_or_equal: 8 }
        disk-size: 50
        cpu-architecture: x86_64
    os:
      properties:
        type: linux
        distribution: ubuntu
        version: "22.04"
    resource:
      properties:
        provider: { $in: [ Amazon ] }
        capacity-provider: ACME
        type: edge
    pricing:
      properties:
        cost: { $less_or_equal: 2}
    locality:
      properties:
        continent: { $in: [ Europe ] }
        country: { $in: [ UK, Spain ] }
        city: { $in: [ London, Madrid ] }
    energy:
      properties:
        energy-type: { $in: [ Green, Mix ] }
        powered-type: { $in: [ Battery, Mains ] }
        consumption: { $less_or_equal: 200}