resource1:
  count: 3
  capabilities:
    host:
      properties:
        num-cpus:        { $in_range: [2, 16] }
        mem-size:        { $greater_or_equal: 4 } # GB 
        disk-size:       10     # GB
        cpu-architecture: x86_64
    os:
      properties:
        type:          linux
        distribution:  ubuntu
        version:       "22.04"
    pricing:
      properties:
        cost: { $less_or_equal: 1} # credit / hr

resource2:
  capabilities:
    host:
      properties:
        num-cpus:        { $in_range: [4, 8] }
        mem-size:        { $greater_or_equal: 32 GB }
        disk-size:       { $greater_or_equal: 100 GB }
        cpu-architecture: x86_64

    os:
      properties:
        type:          linux
        distribution:  ubuntu
        version:       "22.04"

    pricing:
      properties:
        cost: { $less_or_equal: 2 credit / hr}

resource3:
  capabilities:
    host:
      properties:
        num-cpus:        { $in_range: [2, 8] }
        mem-size:        { $greater_or_equal: 8 } 
        disk-size:       50     
        cpu-architecture: x86_64
    os:
      properties:
        type:          linux
        distribution:  ubuntu
        version:       { $in: [ "22.04", "24.04" ] }  
    pricing:
      properties:
        cost: { $less_or_equal: 2} 
