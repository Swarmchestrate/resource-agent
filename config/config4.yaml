# Configuration for SZTAKI OpenStack Cloud RA

id: "SZTAKI-RA"
capacity_id: "SZTAKI_openstack_provider"
universe_id: "swarmchestrate_universe"

credentials:
  provider: "openstack"
  access_key: "your_openstack_access_key"
  secret_key: "your_openstack_secret_key"

api_port: ""  # Different port to avoid conflicts
p2p_port: ""  # Different P2P port
domain: "0.0.0.0"  # Listen on all interfaces

# Bootstrap peers - connect to AWS-RA2 as the hub
bootstrap_peers:
  - "IP:P2p"  # AWS-RA2 hub


