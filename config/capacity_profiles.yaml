# Static Capacity Profiles for Resource Agents
# Designed to match ask.yaml requirements format
# Realistic specifications that can fulfill actual requests

capacity_profiles:
  ra-local:
    metadata:
      ra_id: "ra-local"
      machine_type: "HP EliteBook 640 G11"
      location: "Edinburgh"
      description: "Local Windows development machine - Intel Core Ultra 5"
      version: "1.0"
    
    capabilities:
      host:
        properties:
          num-cpus: 10
          mem-size: 16 GB
          disk-size: 477 GB
          cpu-architecture: x64
      
      os:
        properties:
          type: windows
          distribution: windows
          version: "23H2"
      
      resource:
        properties:
          provider: local
          capacity-provider: local
          type: local
      
      pricing:
        properties:
          cost: 0.00 credit/hr
      
      locality:
        properties:
          continent: Europe
          country: UK
          city: Edinburgh
      
      energy:
        properties:
          energy-type: Mixed
          powered-type: Mains
          consumption: 50 W

